<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>fanter | playing</title>
  <link rel="stylesheet" href="config/main.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0a0a1a, #0f0f2a);
      font-family: 'Ubuntu', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .top-bar {
      background: rgba(10,15,30,0.95);
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(45,90,227,0.3);
    }
    .game-title { color: #ffcc00; font-family: 'Orbitron', monospace; font-size: 18px; }
    button {
      background: rgba(20,30,50,0.8);
      border: 1px solid rgba(45,90,227,0.4);
      border-radius: 20px;
      padding: 6px 14px;
      color: white;
      cursor: pointer;
    }
    iframe {
      flex: 1;
      width: 100%;
      border: none;
    }
    .info {
      position: fixed;
      bottom: 10px;
      right: 10px;
      background: rgba(0,0,0,0.6);
      padding: 5px 10px;
      border-radius: 8px;
      color: #0f0;
      font-family: monospace;
      font-size: 11px;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <span class="game-title" id="gameTitle">Loading...</span>
    <button onclick="window.location.href='index.html'">← Back</button>
  </div>
  <iframe id="gameFrame" src="about:blank"></iframe>
  <div class="info" id="info"></div>

  <script>
    // Get parameters from URL
    const urlParams = new URLSearchParams(window.location.search);
    let gameUrl = urlParams.get("gameurl");
    let gameName = urlParams.get("game") || "Game";
    
    // Decode
    if (gameUrl) {
      gameUrl = decodeURIComponent(gameUrl);
    }
    const decodedName = decodeURIComponent(gameName);
    
    document.getElementById('gameTitle').textContent = decodedName;
    document.getElementById('info').innerHTML = `🎮 ${decodedName}<br>📡 ${gameUrl}`;
    
    console.log("=== PLAY PAGE LOADED ===");
    console.log("Game name:", decodedName);
    console.log("Game URL:", gameUrl);
    
    if (gameUrl && gameUrl !== 'null' && gameUrl !== 'undefined') {
      const iframe = document.getElementById('gameFrame');
      iframe.src = gameUrl;
      console.log("✅ Iframe src set to:", gameUrl);
      
      // Optional: Show when iframe loads
      iframe.onload = () => {
        console.log("✅ Iframe loaded successfully!");
        document.getElementById('info').style.background = "rgba(0,128,0,0.7)";
      };
      iframe.onerror = () => {
        console.error("❌ Iframe failed to load");
        document.getElementById('info').style.background = "rgba(255,0,0,0.7)";
      };
    } else {
      console.error("❌ No game URL provided");
      document.getElementById('gameFrame').style.display = 'none';
      document.body.innerHTML += '<div style="padding:40px;text-align:center;color:#ff4444;">❌ No game URL provided</div>';
    }
  </script>
</body>
</html>
