<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netplay Game | fanterOS</title>
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script src="streaming.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-container {
            background: rgba(15, 15, 25, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(124, 92, 255, 0.3);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            max-width: 900px;
            width: 100%;
        }
        #gameCanvas, #gameStream {
            width: 100%;
            max-width: 800px;
            background: #000;
            border-radius: 12px;
            border: 2px solid #7c5cff;
            min-height: 400px;
        }
        .info {
            margin-top: 15px;
            color: #a0a0c0;
            font-size: 12px;
        }
        .status {
            margin-top: 10px;
            color: #4cd964;
            font-size: 14px;
        }
        .status-error {
            color: #ff5e5e;
        }
        .status-warning {
            color: #ffcc66;
        }
        button {
            background: linear-gradient(135deg, #7c5cff, #5a3cc9);
            border: none;
            border-radius: 30px;
            padding: 8px 20px;
            color: white;
            cursor: pointer;
            margin-top: 15px;
        }
        .controls-info {
            margin-top: 15px;
            color: #ffcc66;
            font-size: 11px;
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #7c5cff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h2 style="color:#ffcc66; margin-bottom:15px;" id="gameTitle">Loading...</h2>
        
        <!-- Host sees emulator canvas, Guest sees video stream -->
        <canvas id="gameCanvas" style="display:none;"></canvas>
        <video id="gameStream" style="display:none;" autoplay muted playsinline></video>
        
        <div class="controls-info">
            🎮 Controls: Arrow Keys | A/B/X/Y | Q/W (L/R) | Enter/Shift (Start/Select)
        </div>
        <div class="status" id="status">Connecting...</div>
        <button id="exitBtn" onclick="window.close()">Exit Game</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const isHost = urlParams.get('host') === 'true';
        const roomId = urlParams.get('room');
        const gameName = urlParams.get('game');
        const gameCore = urlParams.get('core');
        const romUrl = urlParams.get('rom');
        
        // Use your Render server URL here
        const SERVER_URL = 'https://fanter-netplay.onrender.com';
        
        document.getElementById('gameTitle').textContent = `${gameName} - ${isHost ? 'Host' : 'Guest'}`;
        
        // Test if ROM URL is accessible
        async function testRomUrl(url) {
            try {
                console.log('Testing ROM URL:', url);
                const response = await fetch(url, { method: 'HEAD' });
                console.log(`ROM fetch status: ${response.status}`);
                if (!response.ok) {
                    const statusEl = document.getElementById('status');
                    statusEl.textContent = `⚠️ ROM not accessible (${response.status})`;
                    statusEl.className = 'status status-warning';
                    return false;
                } else {
                    console.log('✅ ROM URL is accessible');
                    return true;
                }
            } catch (e) {
                console.error('ROM fetch error:', e);
                const statusEl = document.getElementById('status');
                statusEl.textContent = '⚠️ Cannot access ROM (CORS or network issue)';
                statusEl.className = 'status status-warning';
                return false;
            }
        }
        
        async function loadEmulator(romUrl, gameName, core) {
            return new Promise((resolve) => {
                // Clear any existing emulator elements
                const oldCanvas = document.getElementById('gameCanvas');
                if (oldCanvas) {
                    const oldScript = document.querySelector('script[src*="emulatorjs"]');
                    if (oldScript) oldScript.remove();
                }
                
                // Show loading indicator
                const statusEl = document.getElementById('status');
                statusEl.innerHTML = '<span class="loading-spinner"></span> Loading emulator...';
                statusEl.className = 'status';
                
                // EmulatorJS configuration
                window.EJS_player = '#gameCanvas';
                window.EJS_core = core;
                window.EJS_gameName = gameName;
                window.EJS_gameUrl = romUrl;
                window.EJS_startOnLoaded = true;
                window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
                
                // Fixes for black screen and audio issues
                window.EJS_DEBUG_XX = true;
                window.EJS_ignoreGamepad = true;
                window.EJS_WebGL2 = false;
                window.EJS_recanvas = true;
                window.EJS_video = 'webgl1';
                window.EJS_audio_sampling_rate = 44100;
                window.EJS_audio_latency = 256;
                
                // Force N64 core to use mupen64plus (more compatible)
                if (core === 'n64') {
                    window.EJS_coreOptions = {
                        'retroarch_core': 'mupen64plus_next'
                    };
                }
                
                window.EJS_buttons = {
                    playPause: false, restart: true, mute: false, settings: true,
                    fullscreen: true, saveState: true, loadState: true
                };
                
                // Add a timeout to check if ROM is loading
                let romLoadTimeout = setTimeout(() => {
                    if (!window.EJS_emulator || !window.EJS_emulator.gameManager) {
                        statusEl.innerHTML = '⚠️ Taking too long to load ROM - check console (F12)';
                        statusEl.className = 'status status-warning';
                    }
                }, 15000);
                
                // Load EmulatorJS loader script from CDN
                const script = document.createElement('script');
                script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
                script.onload = () => {
                    console.log('✅ EmulatorJS loader loaded');
                    
                    // Listen for emulator ready event
                    let attempts = 0;
                    const checkEmulator = setInterval(() => {
                        attempts++;
                        if (window.EJS_emulator && window.EJS_emulator.gameManager) {
                            clearInterval(checkEmulator);
                            clearTimeout(romLoadTimeout);
                            console.log('✅ Emulator ready');
                            statusEl.innerHTML = '✅ Emulator ready! Game loading...';
                            statusEl.className = 'status';
                            
                            // Try to start the game
                            if (window.EJS_emulator.gameManager.start) {
                                window.EJS_emulator.gameManager.start();
                            }
                            resolve();
                        } else if (attempts > 40) {
                            // After 20 seconds (40 * 500ms), give up
                            clearInterval(checkEmulator);
                            clearTimeout(romLoadTimeout);
                            console.warn('⚠️ Emulator not ready after timeout');
                            statusEl.innerHTML = '⚠️ Emulator failed to start - check console (F12)';
                            statusEl.className = 'status status-error';
                            resolve();
                        }
                    }, 500);
                };
                script.onerror = () => {
                    console.error('❌ Failed to load EmulatorJS');
                    statusEl.innerHTML = '❌ Failed to load emulator - check console (F12)';
                    statusEl.className = 'status status-error';
                    resolve();
                };
                document.body.appendChild(script);
            });
        }
        
        function getKeyCode(input) {
            const mapping = { up: 4, down: 5, left: 6, right: 7, a: 8, b: 0, x: 9, y: 1, l: 10, r: 11, start: 3, select: 2 };
            const key = Object.keys(input)[0];
            return mapping[key];
        }
        
        async function init() {
            // Test ROM URL first
            const romAccessible = await testRomUrl(romUrl);
            
            if (isHost) {
                // Host: Load emulator and capture stream
                document.getElementById('gameCanvas').style.display = 'block';
                
                if (romAccessible) {
                    await loadEmulator(romUrl, gameName, gameCore);
                } else {
                    document.getElementById('status').innerHTML = '⚠️ Cannot load ROM - check URL';
                    document.getElementById('status').className = 'status status-error';
                    return;
                }
                
                // Start streaming
                const stream = new NetplayStream(SERVER_URL, roomId, true, gameName, gameCore, romUrl);
                stream.onControllerInput((input) => {
                    // Inject controller input into emulator
                    if (window.EJS_emulator && window.EJS_emulator.gameManager) {
                        const code = getKeyCode(input);
                        if (code !== undefined) {
                            window.EJS_emulator.gameManager.simulateInput(0, code, input.pressed ? 1 : 0);
                        }
                    }
                });
                await stream.start();
                document.getElementById('status').innerHTML = '🎮 Hosting game - waiting for players...';
                document.getElementById('status').className = 'status';
            } else {
                // Guest: Watch stream
                document.getElementById('gameStream').style.display = 'block';
                const stream = new NetplayStream(SERVER_URL, roomId, false, gameName, gameCore, romUrl);
                stream.onStreamStarted(() => {
                    document.getElementById('status').innerHTML = '✅ Connected! Watching host\'s game.';
                    document.getElementById('status').className = 'status';
                });
                await stream.start();
                document.getElementById('status').innerHTML = '✅ Connected! Waiting for host to start...';
                document.getElementById('status').className = 'status';
            }
        }
        
        // Start the game
        init();
    </script>
</body>
</html>
