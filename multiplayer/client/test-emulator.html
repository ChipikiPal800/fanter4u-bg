<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Emulator Test - Visual Fix</title>
    <style>
        body { background: #0a0a0f; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: monospace; color: white; }
        .container { text-align: center; }
        canvas { border: 2px solid #7c5cff; border-radius: 12px; background: #000; width: 640px; height: 480px; }
        .status { margin-top: 10px; color: #4cd964; }
        .error { color: #ff5e5e; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Testing Aladdin GBA (Visual Fix)</h2>
        <canvas id="gameCanvas"></canvas>
        <div class="status" id="status">Loading emulator...</div>
    </div>

    <script>
        const ROM_URL = 'https://chipikipal800.github.io/MKGBA2.0/Binaries/aladdin.gba';
        
        // Clear any existing emulator
        delete window.EJS_emulator;
        
        window.EJS_player = '#gameCanvas';
        window.EJS_core = 'gba';
        window.EJS_gameName = 'Aladdin';
        window.EJS_gameUrl = ROM_URL;
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        
        // CRITICAL FIXES for black screen with sound
        window.EJS_DEBUG_XX = true;
        window.EJS_ignoreGamepad = true;
        window.EJS_WebGL2 = false;           // Force WebGL1 instead of WebGL2
        window.EJS_recanvas = true;           // Force canvas recreation
        window.EJS_video = 'webgl1';          // Explicit video driver
        window.EJS_forceWebGL1 = true;        // Additional WebGL1 force
        window.EJS_software = false;          // Don't use software rendering
        
        // Audio settings (already working)
        window.EJS_audio_sampling_rate = 44100;
        window.EJS_audio_latency = 256;
        
        window.EJS_startOnLoaded = true;
        window.EJS_defaultOptions = { 'virtual-gamepad': true };
        
        // Remove old script
        const oldScript = document.querySelector('script[src*="emulatorjs"]');
        if (oldScript) oldScript.remove();
        
        const script = document.createElement('script');
        script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
        script.onload = () => {
            const statusEl = document.getElementById('status');
            statusEl.textContent = 'Emulator loaded, starting game...';
            
            let attempts = 0;
            const checkInterval = setInterval(() => {
                attempts++;
                if (window.EJS_emulator && window.EJS_emulator.gameManager) {
                    clearInterval(checkInterval);
                    statusEl.textContent = '✅ Game running! (sound OK, video might be delayed)';
                    
                    // Force canvas redraw
                    const canvas = document.getElementById('gameCanvas');
                    if (canvas) {
                        canvas.style.display = 'none';
                        setTimeout(() => { canvas.style.display = 'block'; }, 100);
                    }
                } else if (attempts > 60) {
                    clearInterval(checkInterval);
                    statusEl.textContent = '⚠️ Emulator loaded but not responding';
                }
            }, 500);
        };
        script.onerror = () => {
            document.getElementById('status').textContent = '❌ Failed to load EmulatorJS';
            document.getElementById('status').className = 'error';
        };
        document.body.appendChild(script);
    </script>
</body>
</html>
