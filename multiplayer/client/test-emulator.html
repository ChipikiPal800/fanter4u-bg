<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Emulator Test - GBA Core</title>
    <style>
        body { background: #0a0a0f; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: monospace; color: white; }
        .container { text-align: center; }
        canvas { border: 2px solid #7c5cff; border-radius: 12px; background: #000; width: 640px; height: 480px; }
        .status { margin-top: 10px; color: #4cd964; }
        .error { color: #ff5e5e; }
        .loading { color: #ffcc66; }
        button { background: #7c5cff; border: none; padding: 10px 20px; color: white; margin: 10px; cursor: pointer; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>EmulatorJS Test (GBA Core)</h2>
        <canvas id="gameCanvas"></canvas>
        <div class="status" id="status">Initializing...</div>
        <button onclick="loadROM()">Load Test ROM</button>
    </div>

    <script>
        // Use a GBA ROM (smaller, more compatible)
        const TEST_ROM_URL = 'https://raw.githubusercontent.com/ianatha/bgb-test-roms/master/tetris.gb';
        
        // Clear any existing emulator config
        delete window.EJS_emulator;
        
        // Configure EmulatorJS - Use GBA core (more stable)
        window.EJS_player = '#gameCanvas';
        window.EJS_core = 'gba';  // Changed from 'gb' to 'gba'
        window.EJS_gameName = 'Tetris GBA';
        window.EJS_gameUrl = TEST_ROM_URL;
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        window.EJS_DEBUG_XX = true;
        window.EJS_ignoreGamepad = true;
        window.EJS_WebGL2 = false;
        window.EJS_recanvas = true;
        window.EJS_video = 'webgl1';
        window.EJS_startOnLoaded = true;  // Let it auto-start
        window.EJS_defaultOptions = { 'virtual-gamepad': true };
        
        // Remove any existing script
        const oldScript = document.querySelector('script[src*="emulatorjs"]');
        if (oldScript) oldScript.remove();
        
        function loadROM() {
            const statusEl = document.getElementById('status');
            statusEl.textContent = 'Loading ROM via fetch...';
            
            fetch(TEST_ROM_URL)
                .then(response => response.blob())
                .then(blob => {
                    const url = URL.createObjectURL(blob);
                    if (window.EJS_emulator && window.EJS_emulator.gameManager) {
                        window.EJS_emulator.gameManager.loadROM(url);
                        setTimeout(() => {
                            if (window.EJS_emulator.gameManager.start) {
                                window.EJS_emulator.gameManager.start();
                            }
                            statusEl.textContent = '✅ Game should be running!';
                            statusEl.className = 'status';
                        }, 1000);
                    } else {
                        statusEl.textContent = 'Emulator not ready yet!';
                        statusEl.className = 'error';
                    }
                })
                .catch(err => {
                    console.error(err);
                    statusEl.textContent = 'Fetch failed: ' + err.message;
                    statusEl.className = 'error';
                });
        }
        
        // Load EmulatorJS with a cache-busting parameter
        const script = document.createElement('script');
        script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js?v=' + Date.now();
        script.onload = () => {
            const statusEl = document.getElementById('status');
            statusEl.textContent = 'Emulator loaded, waiting for ready...';
            
            let attempts = 0;
            const checkInterval = setInterval(() => {
                attempts++;
                if (window.EJS_emulator && window.EJS_emulator.gameManager) {
                    clearInterval(checkInterval);
                    statusEl.textContent = '✅ Emulator ready! Click "Load Test ROM"';
                    statusEl.className = 'status';
                    console.log('Emulator ready');
                } else if (attempts > 60) {
                    clearInterval(checkInterval);
                    statusEl.textContent = '❌ Emulator still not ready - try a different browser';
                    statusEl.className = 'error';
                    console.error('Emulator not ready after 30 seconds');
                }
            }, 500);
        };
        script.onerror = () => {
            document.getElementById('status').textContent = '❌ Failed to load EmulatorJS';
            document.getElementById('status').className = 'error';
        };
        document.body.appendChild(script);
    </script>
</body>
</html>
