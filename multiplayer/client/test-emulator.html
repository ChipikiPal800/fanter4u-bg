<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Emulator Test - Aladdin GBA</title>
    <style>
        body { background: #0a0a0f; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: monospace; color: white; }
        .container { text-align: center; }
        canvas { border: 2px solid #7c5cff; border-radius: 12px; background: #000; width: 640px; height: 480px; }
        .status { margin-top: 10px; color: #4cd964; }
        .error { color: #ff5e5e; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Testing Aladdin GBA</h2>
        <canvas id="gameCanvas"></canvas>
        <div class="status" id="status">Loading emulator...</div>
    </div>

    <script>
        // Your working ROM URL
        const ROM_URL = 'https://chipikipal800.github.io/MKGBA2.0/Binaries/aladdin.gba';
        
        // Configure EmulatorJS - Set startOnLoaded to true so it auto-starts
        window.EJS_player = '#gameCanvas';
        window.EJS_core = 'gba';
        window.EJS_gameName = 'Aladdin';
        window.EJS_gameUrl = ROM_URL;
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        window.EJS_DEBUG_XX = true;
        window.EJS_ignoreGamepad = true;
        window.EJS_WebGL2 = false;
        window.EJS_recanvas = true;
        window.EJS_video = 'webgl1';
        window.EJS_startOnLoaded = true;  // CRITICAL: Auto-start the game
        window.EJS_defaultOptions = { 'virtual-gamepad': true };
        
        // Remove any existing script and load fresh
        const oldScript = document.querySelector('script[src*="emulatorjs"]');
        if (oldScript) oldScript.remove();
        
        const script = document.createElement('script');
        script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
        script.onload = () => {
            const statusEl = document.getElementById('status');
            statusEl.textContent = 'Emulator loaded, starting game...';
            
            // Check if emulator is ready
            let attempts = 0;
            const checkInterval = setInterval(() => {
                attempts++;
                if (window.EJS_emulator && window.EJS_emulator.gameManager) {
                    clearInterval(checkInterval);
                    statusEl.textContent = '✅ Game should be running!';
                    console.log('Emulator ready, game should start automatically');
                } else if (attempts > 60) {
                    clearInterval(checkInterval);
                    statusEl.textContent = '⚠️ Emulator loaded but game not starting - check console';
                    statusEl.className = 'error';
                }
            }, 500);
        };
        script.onerror = () => {
            document.getElementById('status').textContent = '❌ Failed to load EmulatorJS';
            document.getElementById('status').className = 'error';
        };
        document.body.appendChild(script);
    </script>
</body>
</html>
