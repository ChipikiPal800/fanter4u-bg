<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Emulator Test - Fixed</title>
    <style>
        body { background: #0a0a0f; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: monospace; color: white; }
        .container { text-align: center; }
        canvas { 
            border: 2px solid #7c5cff; 
            border-radius: 12px; 
            background: #000; 
            width: 100%; 
            max-width: 640px; 
            height: auto;
            aspect-ratio: 4/3;
        }
        .status { margin-top: 10px; color: #4cd964; }
        .error { color: #ff5e5e; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Testing Aladdin GBA - Fixed</h2>
        <canvas id="gameCanvas"></canvas>
        <div class="status" id="status">Loading emulator...</div>
    </div>

    <script>
        const ROM_URL = 'https://chipikipal800.github.io/MKGBA2.0/Binaries/aladdin.gba';
        
        // Kill any existing emulator
        if (window.EJS_emulator) {
            try { window.EJS_emulator.destroy(); } catch(e) {}
            window.EJS_emulator = null;
        }
        
        // CRITICAL: These two settings fix the black screen issue [citation:1]
        window.EJS_DEBUG_XX = true;        // Bypasses GamepadHandler error
        window.EJS_ignoreGamepad = true;    // Disables problematic gamepad module
        
        // Standard configuration
        window.EJS_player = '#gameCanvas';
        window.EJS_core = 'gba';
        window.EJS_gameName = 'Aladdin';
        window.EJS_gameUrl = ROM_URL;
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        window.EJS_WebGL2 = false;
        window.EJS_recanvas = true;
        window.EJS_video = 'webgl1';
        
        // Audio settings (fix croaking) [citation:2]
        window.EJS_audio_sampling_rate = 44100;
        window.EJS_audio_latency = 256;
        
        window.EJS_startOnLoaded = true;
        
        // Remove old script and load fresh
        const oldScript = document.querySelector('script[src*="emulatorjs"]');
        if (oldScript) oldScript.remove();
        
        const script = document.createElement('script');
        script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
        script.onload = () => {
            document.getElementById('status').textContent = '✅ Game should be running with video!';
        };
        script.onerror = () => {
            document.getElementById('status').textContent = '❌ Failed to load EmulatorJS';
            document.getElementById('status').className = 'error';
        };
        document.body.appendChild(script);
    </script>
</body>
</html>
