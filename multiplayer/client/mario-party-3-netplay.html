<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mario Party 3 - Netplay Test</title>
    <style>
        body {
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        canvas {
            border: 2px solid #7c5cff;
            border-radius: 12px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script>
        // ===== ROM URL (GitHub Release) =====
        const ROM_URL = 'https://github.com/ChipikiPal800/fanter.os/releases/download/v1.0/Mario.Party.3.NA.z64';
        
        // ===== NETPLAY CONFIGURATION =====
        window.EJS_netplayUrl = 'https://fanter-netplay.onrender.com';
        window.EJS_gameID = 1;
        
        // ===== EMULATOR CONFIGURATION =====
        window.EJS_player = '#gameCanvas';
        window.EJS_core = 'n64';
        window.EJS_gameName = 'Mario Party 3';
        window.EJS_gameUrl = ROM_URL;
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        window.EJS_startOnLoaded = true;
        window.EJS_DEBUG_XX = true;
        window.EJS_ignoreGamepad = true;
        
        // Load EmulatorJS
        const script = document.createElement('script');
        script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
        document.body.appendChild(script);
    </script>
</body>
</html>
