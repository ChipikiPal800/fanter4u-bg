<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mario Party 3 - Netplay Test</title>
    <style>
        body {
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: monospace;
        }
        canvas {
            border: 2px solid #7c5cff;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(124,92,255,0.3);
        }
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: #a0a0c0;
            font-size: 12px;
            background: rgba(0,0,0,0.7);
            padding: 8px 12px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div class="info">
        🎮 Mario Party 3 Netplay | Host: Create room → Share code | Join: Enter code
    </div>

   <script>
    // ===== NETPLAY CONFIGURATION (MUST BE BEFORE LOADING EMULATOR) =====
    window.EJS_netplayUrl = 'https://fanter-netplay.onrender.com';
    window.EJS_gameID = 1;
    
    const ROM_URL = 'https://corsproxy.io/?' + encodeURIComponent('https://drive.usercontent.google.com/download?id=1LCU9Ix-Vpr35XZxOgAHWuWOVUuRwkXi5&export=download');
    
    // ===== EMULATOR CONFIGURATION =====
    window.EJS_player = '#gameCanvas';
    window.EJS_core = 'n64';
    window.EJS_gameName = 'Mario Party 3';
    window.EJS_gameUrl = ROM_URL;
    window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
    window.EJS_startOnLoaded = true;
    window.EJS_DEBUG_XX = true;
    window.EJS_ignoreGamepad = true;
    
    // Load EmulatorJS
    const script = document.createElement('script');
    script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
    script.onload = () => console.log('✅ EmulatorJS loaded');
    document.body.appendChild(script);
</script>
</body>
</html>
