<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>fanterOS — chill desktop</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0f0f1a;
      --bg-secondary: #1a1a2e;
      --bg-tertiary: #25253a;
      --accent: #7c5cff;
      --accent-glow: rgba(124, 92, 255, 0.3);
      --accent-light: #9b7cff;
      --text-primary: #f0f0ff;
      --text-secondary: #a0a0c0;
      --text-muted: #606080;
      --border: #2a2a40;
      --glass: rgba(30, 30, 50, 0.7);
      --glass-border: rgba(255, 255, 255, 0.08);
      --success: #4cd964;
      --warning: #ffcc00;
      --danger: #ff5e5e;
      --info: #5e7ce6;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      overflow: hidden;
      height: 100vh;
      color: var(--text-primary);
    }

    /* ===== DESKTOP ===== */
    .desktop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #0f0f1a 100%);
      z-index: 0;
      overflow: hidden;
    }

    /* Animated background */
    .desktop::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: radial-gradient(circle at 30% 40%, rgba(124, 92, 255, 0.08) 0%, transparent 50%),
                  radial-gradient(circle at 70% 60%, rgba(124, 92, 255, 0.05) 0%, transparent 50%);
      animation: bgFloat 20s ease infinite;
      pointer-events: none;
    }

    @keyframes bgFloat {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(2%, 1%) rotate(1deg); }
    }

    /* ===== DESKTOP ICONS ===== */
    .desktop-icons {
      position: absolute;
      top: 20px;
      left: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 10;
    }

    .desktop-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 85px;
      padding: 10px 6px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      background: rgba(255, 255, 255, 0);
    }

    .desktop-icon:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-3px);
    }

    .desktop-icon .icon {
      font-size: 36px;
      margin-bottom: 6px;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    }

    .desktop-icon .label {
      font-size: 11px;
      text-align: center;
      color: rgba(255, 255, 255, 0.85);
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
      font-weight: 500;
    }

    /* ===== TASKBAR (auto-hide) ===== */
    .taskbar {
      position: fixed;
      bottom: -70px;
      left: 10px;
      right: 10px;
      height: 56px;
      background: var(--glass);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 1000;
      transition: bottom 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    .taskbar.visible { bottom: 10px; }
    .taskbar:hover { bottom: 10px; }

    .start-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 20px;
      background: linear-gradient(135deg, var(--accent), #5a3cc9);
      border-radius: 16px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(124, 92, 255, 0.3);
    }

    .start-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 12px rgba(124, 92, 255, 0.4);
    }

    .taskbar-apps {
      display: flex;
      gap: 6px;
      flex: 1;
      margin-left: 20px;
      overflow-x: auto;
      padding: 4px 0;
    }

    .taskbar-app {
      padding: 6px 16px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      white-space: nowrap;
      transition: all 0.15s;
    }

    .taskbar-app:hover { background: rgba(255, 255, 255, 0.1); }
    .taskbar-app.active { background: var(--accent); }

    .taskbar-right {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .taskbar-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-secondary);
      background: rgba(255,255,255,0.05);
      padding: 6px 12px;
      border-radius: 12px;
    }

    .notification-btn, .workspace-btn {
      background: rgba(255,255,255,0.05);
      border: none;
      border-radius: 10px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.15s;
    }

    .notification-btn:hover, .workspace-btn:hover { background: rgba(255,255,255,0.1); }

    /* ===== START MENU ===== */
    .start-menu {
      position: fixed;
      bottom: 76px;
      left: 20px;
      width: 360px;
      background: var(--glass);
      backdrop-filter: blur(24px);
      border-radius: 20px;
      border: 1px solid var(--glass-border);
      z-index: 1001;
      transform: translateY(20px) scale(0.98);
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s ease;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    .start-menu.open {
      transform: translateY(0) scale(1);
      opacity: 1;
      visibility: visible;
    }

    .start-header {
      padding: 20px;
      background: linear-gradient(135deg, rgba(124,92,255,0.2), rgba(124,92,255,0.05));
      border-bottom: 1px solid var(--glass-border);
    }

    .start-header .user-name { font-weight: 600; font-size: 16px; }
    .start-header .user-status { font-size: 12px; opacity: 0.7; margin-top: 4px; }

    .start-search { padding: 12px 16px; border-bottom: 1px solid var(--glass-border); }
    .start-search input {
      width: 100%;
      padding: 10px 14px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      color: white;
      font-size: 13px;
      outline: none;
    }
    .start-search input:focus { border-color: var(--accent); }

    .start-apps {
      max-height: 420px;
      overflow-y: auto;
      padding: 8px;
    }

    .start-app {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.1s;
    }

    .start-app:hover { background: rgba(255, 255, 255, 0.08); }
    .start-app-icon { font-size: 24px; width: 40px; text-align: center; }
    .start-app-name { font-size: 14px; font-weight: 500; flex: 1; }
    .start-app-desc { font-size: 11px; color: var(--text-muted); }

    /* ===== BOOT MENU (Ctrl+K) ===== */
    .boot-menu {
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translate(-50%, -30%);
      width: 540px;
      max-width: 90vw;
      background: var(--glass);
      backdrop-filter: blur(28px);
      border-radius: 24px;
      border: 1px solid var(--glass-border);
      z-index: 10000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s ease;
      box-shadow: 0 24px 48px rgba(0,0,0,0.4);
    }

    .boot-menu.open { opacity: 1; visibility: visible; transform: translate(-50%, 0); }

    .boot-search { padding: 20px; border-bottom: 1px solid var(--glass-border); }
    .boot-search input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      color: white;
      font-size: 16px;
      outline: none;
    }
    .boot-search input:focus { border-color: var(--accent); }

    .boot-results { max-height: 400px; overflow-y: auto; padding: 12px; }
    .boot-result {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      border-radius: 14px;
      cursor: pointer;
    }
    .boot-result.selected { background: var(--accent); }
    .boot-result:hover:not(.selected) { background: rgba(255,255,255,0.08); }
    .boot-result-icon { font-size: 28px; }
    .boot-result-info { flex: 1; }
    .boot-result-name { font-weight: 500; }
    .boot-result-desc { font-size: 11px; color: var(--text-muted); }

    .boot-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--glass-border);
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
    }

    /* ===== WINDOW ===== */
    .window {
      position: absolute;
      min-width: 500px;
      min-height: 400px;
      background: var(--bg-secondary);
      border-radius: 20px;
      border: 1px solid var(--border);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
      z-index: 100;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      backdrop-filter: blur(0px);
    }

    .window.active {
      z-index: 200;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 0 2px var(--accent);
    }

    .window.minimized {
      transform: scale(0) !important;
      opacity: 0;
      pointer-events: none;
    }

    .window.maximized {
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: calc(100% - 80px) !important;
      border-radius: 0;
    }

    .window-header {
      padding: 12px 16px;
      background: var(--bg-tertiary);
      cursor: move;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .window-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 500;
    }

    .window-controls { display: flex; gap: 8px; }
    .window-control {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      transition: all 0.1s;
    }
    .window-control:hover { background: rgba(255, 255, 255, 0.1); }
    .window-control.close:hover { background: var(--danger); color: white; }

    .window-content {
      flex: 1;
      overflow: auto;
      background: var(--bg-primary);
    }

    .window-content iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .resize-handle {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 20px;
      height: 20px;
      cursor: nw-resize;
      background: linear-gradient(135deg, transparent 50%, rgba(255,255,255,0.1) 50%);
      z-index: 10;
      border-radius: 0 0 20px 0;
    }

    /* ===== NOTIFICATION CENTER ===== */
    .notification-center {
      position: fixed;
      top: 20px;
      right: -380px;
      width: 360px;
      background: var(--glass);
      backdrop-filter: blur(24px);
      border-radius: 20px;
      border: 1px solid var(--glass-border);
      z-index: 1002;
      transition: right 0.3s ease;
      padding: 16px;
    }

    .notification-center.open { right: 20px; }

    .notification-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--glass-border);
    }

    .notification-list { max-height: 400px; overflow-y: auto; }
    .notification-item {
      padding: 12px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      margin-bottom: 8px;
      font-size: 12px;
    }

    /* ===== WORKSPACE INDICATOR ===== */
    .workspace-indicator {
      position: fixed;
      bottom: 80px;
      right: 20px;
      background: var(--glass);
      backdrop-filter: blur(12px);
      border-radius: 30px;
      padding: 8px 16px;
      font-size: 12px;
      z-index: 100;
      border: 1px solid var(--glass-border);
    }

    /* ===== UTILITIES ===== */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); border-radius: 3px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    .hidden { display: none; }

    /* Game Hub inner styles */
    .game-hub-inner {
      padding: 20px;
      height: 100%;
      overflow-y: auto;
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .game-card {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
    }

    .game-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
    }

    .game-card img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
    }

    .game-card-info { padding: 10px; }
    .game-card-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .game-card-category { font-size: 10px; color: var(--text-muted); margin-top: 4px; }

    .search-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .search-bar input {
      flex: 1;
      padding: 10px 16px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 30px;
      color: white;
      font-size: 13px;
      outline: none;
    }

    .category-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    .cat-chip {
      padding: 6px 14px;
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.1s;
    }

    .cat-chip.active {
      background: var(--accent);
    }

    .footer-credit {
      text-align: center;
      padding: 20px;
      color: var(--text-muted);
      font-size: 11px;
      border-top: 1px solid var(--border);
      margin-top: 20px;
    }
  </style>
</head>
<body>

<div class="desktop" id="desktop"></div>

<!-- Desktop Icons -->
<div class="desktop-icons" id="desktopIcons"></div>

<!-- Workspace Indicator -->
<div class="workspace-indicator" id="workspaceIndicator">🌿 workspace 1</div>

<!-- Notification Center -->
<div class="notification-center" id="notificationCenter">
  <div class="notification-header">
    <span>🔔 notifications</span>
    <button class="notification-btn" onclick="closeNotifications()" style="padding:4px 8px;">✕</button>
  </div>
  <div class="notification-list" id="notificationList">
    <div class="notification-item">🎉 welcome to fanterOS!</div>
    <div class="notification-item">💡 press Ctrl+K to quick launch games</div>
  </div>
</div>

<!-- Taskbar -->
<div class="taskbar" id="taskbar">
  <div class="start-btn" id="startBtn">🍥 fanterOS</div>
  <div class="taskbar-apps" id="taskbarApps"></div>
  <div class="taskbar-right">
    <button class="notification-btn" id="notifBtn" style="font-size:16px;">🔔</button>
    <button class="workspace-btn" id="workspaceBtn" style="font-size:16px;">🌿</button>
    <div class="taskbar-time" id="taskbarTime">--:--</div>
  </div>
</div>

<!-- Start Menu -->
<div class="start-menu" id="startMenu">
  <div class="start-header">
    <div class="user-name" id="startUserName">Guest</div>
    <div class="user-status">🟢 online · chill mode</div>
  </div>
  <div class="start-search"><input type="text" id="startSearch" placeholder="Search apps..."></div>
  <div class="start-apps" id="startApps"></div>
</div>

<!-- Boot Menu -->
<div class="boot-menu" id="bootMenu">
  <div class="boot-search"><input type="text" id="bootSearch" placeholder="Search games..." autocomplete="off"></div>
  <div class="boot-results" id="bootResults"></div>
  <div class="boot-footer"><span>↑↓ navigate</span><span>↵ play</span><span>esc close</span></div>
</div>

<script>
  // ============================================================
  // FANTER OS - COMPLETE CHILL DESKTOP
  // ============================================================

  // --- App Definitions ---
  const APPS = [
    { id: 'gamehub', name: 'Game Hub', icon: '🎮', url: null, desc: 'Browse all games', isBuiltin: true },
    { id: 'shop', name: 'Item Shop', icon: '🛒', url: 'shop.html', desc: 'Buy themes & pets' },
    { id: 'settings', name: 'Settings', icon: '⚙️', url: 'settings.html', desc: 'Customize your OS' },
    { id: 'fantarena', name: 'Fantarena', icon: '🏟️', url: 'fantarena.html', desc: 'Chat with friends' },
    { id: 'account', name: 'My Account', icon: '👤', url: 'fantaccount.html', desc: 'Profile & achievements' },
    { id: 'fanterai', name: 'Fanter AI', icon: '🤖', url: 'https://chipikipal800.github.io/fanter.ai/', desc: 'AI assistant', external: true },
    { id: 'fanterstudios', name: 'Fanter Studios', icon: '🎨', url: 'https://chipikipal800.github.io/fanter-studios/', desc: 'Create games', external: true },
    { id: 'fantersearch', name: 'Fanter Search', icon: '🔍', url: 'https://chipikipal800.github.io/Fanter-search/', desc: 'Proxy browser', external: true },
    { id: 'fanterclicker', name: 'Fanter Clicker', icon: '🍪', url: 'https://chipikipal800.github.io/Fanter-Clicker/', desc: 'Clicker game', external: true }
  ];

  const DESKTOP_ICONS = [
    { id: 'gamehub', icon: '🎮', label: 'Game Hub' },
    { id: 'shop', icon: '🛒', label: 'Shop' },
    { id: 'settings', icon: '⚙️', label: 'Settings' },
    { id: 'fantarena', icon: '🏟️', label: 'Chat' }
  ];

  // --- State ---
  let windows = [];
  let nextWindowId = 1;
  let activeWindowId = null;
  let startMenuOpen = false;
  let bootMenuOpen = false;
  let currentBootResults = [];
  let selectedBootIndex = -1;
  let gamesData = [];
  let currentCategory = 'all';
  let currentSort = 'default';
  let favourites = JSON.parse(localStorage.getItem('favourites') || '[]');
  let userVotes = JSON.parse(localStorage.getItem('userVotes') || '{}');
  let globalRatings = JSON.parse(localStorage.getItem('globalRatings') || '{}');
  let gamePlayCounts = JSON.parse(localStorage.getItem('gamePlayCounts') || '{}');

  // Drag state
  let dragWindow = null;
  let dragOffsetX = 0, dragOffsetY = 0;
  let resizeWindow = null;
  let resizeStartX = 0, resizeStartY = 0;
  let resizeStartW = 0, resizeStartH = 0;

  // --- Helper Functions ---
  function escapeHtml(s) { if (!s) return ''; return s.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]); }

  function showNotification(msg) {
    const list = document.getElementById('notificationList');
    const notif = document.createElement('div');
    notif.className = 'notification-item';
    notif.textContent = msg;
    list.prepend(notif);
    setTimeout(() => notif.remove(), 5000);
  }

  function updateClock() {
    const now = new Date();
    document.getElementById('taskbarTime').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function getCurrentUser() {
    try {
      const user = JSON.parse(localStorage.getItem('fanter_currentUser') || 'null');
      return user || { username: 'Guest', displayName: 'Guest', coins: 0 };
    } catch(e) { return { username: 'Guest', displayName: 'Guest', coins: 0 }; }
  }

  function updateUserDisplay() {
    const user = getCurrentUser();
    document.getElementById('startUserName').textContent = user.displayName || user.username || 'Guest';
  }

  // --- Window Management ---
  function createBuiltinGameHub(x = 80, y = 60, w = 1000, h = 700) {
    const id = nextWindowId++;
    
    const win = document.createElement('div');
    win.className = 'window';
    win.id = `window-${id}`;
    win.style.left = `${x}px`;
    win.style.top = `${y}px`;
    win.style.width = `${w}px`;
    win.style.height = `${h}px`;
    
    win.innerHTML = `
      <div class="window-header">
        <div class="window-title"><span>🎮</span><span>Game Hub</span></div>
        <div class="window-controls">
          <button class="window-control minimize" data-action="minimize">─</button>
          <button class="window-control maximize" data-action="maximize">□</button>
          <button class="window-control close" data-action="close">✕</button>
        </div>
      </div>
      <div class="window-content" id="gamehub-content-${id}">
        <div class="game-hub-inner">
          <div class="search-bar">
            <input type="text" id="gameSearch-${id}" placeholder="Search games...">
          </div>
          <div class="category-filters" id="categoryFilters-${id}"></div>
          <div class="game-grid" id="gameGrid-${id}"></div>
          <div class="footer-credit">
            a site created by abcatlmfao · parcoil network
          </div>
        </div>
      </div>
      <div class="resize-handle"></div>
    `;
    
    document.body.appendChild(win);
    
    windows.push({ id, element: win, app: APPS.find(a => a.id === 'gamehub'), minimized: false, maximized: false, x, y, w, h, isBuiltin: true });
    focusWindow(id);
    setupWindowEvents(win, id);
    updateTaskbar();
    
    // Initialize Game Hub content
    initGameHubContent(id);
    return id;
  }

  function initGameHubContent(windowId) {
    const searchInput = document.getElementById(`gameSearch-${windowId}`);
    const categoryContainer = document.getElementById(`categoryFilters-${windowId}`);
    const gridContainer = document.getElementById(`gameGrid-${windowId}`);
    
    const categories = ['all', 'action', 'puzzle', 'racing', 'sports', 'adventure', 'platformer', 'strategy', 'horror', 'arcade', 'simulation', 'sandbox'];
    const categoryNames = { all: '🎮 All', action: '⚔️ Action', puzzle: '🧩 Puzzle', racing: '🏎️ Racing', sports: '⚽ Sports', adventure: '🗺️ Adventure', platformer: '🏃 Platformer', strategy: '♟️ Strategy', horror: '👻 Horror', arcade: '🕹️ Arcade', simulation: '🏭 Simulation', sandbox: '🎨 Sandbox' };
    
    function renderGameGrid() {
      if (!gridContainer) return;
      let filtered = gamesData;
      if (currentCategory !== 'all') filtered = filtered.filter(g => g.category === currentCategory);
      const searchTerm = searchInput?.value.toLowerCase() || '';
      if (searchTerm) filtered = filtered.filter(g => g.name.toLowerCase().includes(searchTerm));
      
      gridContainer.innerHTML = filtered.map(game => `
        <div class="game-card" data-game="${escapeHtml(game.name)}" data-url="${escapeHtml(game.url)}">
          <img src="${game.image}" alt="${escapeHtml(game.name)}" loading="lazy">
          <div class="game-card-info">
            <div class="game-card-name">${escapeHtml(game.name.length > 20 ? game.name.slice(0,18)+'...' : game.name)}</div>
            <div class="game-card-category">${game.category || 'game'}</div>
          </div>
        </div>
      `).join('');
      
      gridContainer.querySelectorAll('.game-card').forEach(card => {
        card.addEventListener('click', () => {
          const gameName = card.dataset.game;
          const gameUrl = card.dataset.url;
          const game = gamesData.find(g => g.name === gameName);
          if (game) {
            trackPlayedGame(gameName);
            window.open(`play.html?gameurl=${encodeURIComponent(gameUrl)}&game=${encodeURIComponent(gameName)}`, '_blank');
          }
        });
      });
    }
    
    function renderCategoryFilters() {
      if (!categoryContainer) return;
      categoryContainer.innerHTML = categories.map(cat => `
        <div class="cat-chip ${currentCategory === cat ? 'active' : ''}" data-cat="${cat}">${categoryNames[cat] || cat}</div>
      `).join('');
      categoryContainer.querySelectorAll('.cat-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          currentCategory = chip.dataset.cat;
          renderCategoryFilters();
          renderGameGrid();
        });
      });
    }
    
    if (searchInput) searchInput.addEventListener('input', () => renderGameGrid());
    renderCategoryFilters();
    renderGameGrid();
  }

  function createWindow(app, x = 120, y = 80, w = 900, h = 650) {
    if (app.isBuiltin) return createBuiltinGameHub(x, y, w, h);
    
    const id = nextWindowId++;
    const isExternal = app.external;
    const url = app.url;
    
    const win = document.createElement('div');
    win.className = 'window';
    win.id = `window-${id}`;
    win.style.left = `${x}px`;
    win.style.top = `${y}px`;
    win.style.width = `${w}px`;
    win.style.height = `${h}px`;
    
    win.innerHTML = `
      <div class="window-header">
        <div class="window-title"><span>${app.icon}</span><span>${app.name}</span></div>
        <div class="window-controls">
          <button class="window-control minimize" data-action="minimize">─</button>
          <button class="window-control maximize" data-action="maximize">□</button>
          <button class="window-control close" data-action="close">✕</button>
        </div>
      </div>
      <div class="window-content">
        ${isExternal ? 
          `<iframe src="${url}" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation"></iframe>` :
          `<iframe src="${url}" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation"></iframe>`
        }
      </div>
      <div class="resize-handle"></div>
    `;
    
    document.body.appendChild(win);
    windows.push({ id, element: win, app, minimized: false, maximized: false, x, y, w, h });
    focusWindow(id);
    setupWindowEvents(win, id);
    updateTaskbar();
    return id;
  }

  function setupWindowEvents(win, id) {
    const header = win.querySelector('.window-header');
    const resizeHandle = win.querySelector('.resize-handle');
    const minimizeBtn = win.querySelector('[data-action="minimize"]');
    const maximizeBtn = win.querySelector('[data-action="maximize"]');
    const closeBtn = win.querySelector('[data-action="close"]');
    
    win.addEventListener('mousedown', (e) => {
      if (e.target === resizeHandle || e.target.closest('.resize-handle')) return;
      focusWindow(id);
    });
    
    let dragStart = null;
    header.addEventListener('mousedown', (e) => {
      if (e.target.closest('.window-controls')) return;
      dragStart = { x: e.clientX, y: e.clientY, left: parseInt(win.style.left), top: parseInt(win.style.top) };
      document.addEventListener('mousemove', onDrag);
      document.addEventListener('mouseup', stopDrag);
    });
    
    function onDrag(e) {
      if (!dragStart) return;
      const dx = e.clientX - dragStart.x;
      const dy = e.clientY - dragStart.y;
      win.style.left = `${dragStart.left + dx}px`;
      win.style.top = `${dragStart.top + dy}px`;
      const wData = windows.find(w => w.id === id);
      if (wData && !wData.maximized) { wData.x = dragStart.left + dx; wData.y = dragStart.top + dy; }
    }
    
    function stopDrag() { dragStart = null; document.removeEventListener('mousemove', onDrag); document.removeEventListener('mouseup', stopDrag); }
    
    let resizeActive = false;
    resizeHandle.addEventListener('mousedown', (e) => {
      e.stopPropagation();
      resizeActive = true;
      resizeWindow = id;
      resizeStartX = e.clientX;
      resizeStartY = e.clientY;
      const wData = windows.find(w => w.id === id);
      if (wData) { resizeStartW = wData.w; resizeStartH = wData.h; }
      document.addEventListener('mousemove', onResize);
      document.addEventListener('mouseup', stopResize);
    });
    
    function onResize(e) {
      if (!resizeActive) return;
      const dx = e.clientX - resizeStartX;
      const dy = e.clientY - resizeStartY;
      const newW = Math.max(400, resizeStartW + dx);
      const newH = Math.max(300, resizeStartH + dy);
      win.style.width = `${newW}px`;
      win.style.height = `${newH}px`;
      const wData = windows.find(w => w.id === resizeWindow);
      if (wData && !wData.maximized) { wData.w = newW; wData.h = newH; }
    }
    
    function stopResize() { resizeActive = false; resizeWindow = null; document.removeEventListener('mousemove', onResize); document.removeEventListener('mouseup', stopResize); }
    
    minimizeBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleMinimize(id); });
    maximizeBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleMaximize(id); });
    closeBtn.addEventListener('click', (e) => { e.stopPropagation(); closeWindow(id); });
  }

  function focusWindow(id) {
    activeWindowId = id;
    windows.forEach(win => {
      win.element.classList.remove('active');
      if (win.id === id) {
        win.element.classList.add('active');
        win.element.style.zIndex = 100 + windows.findIndex(w => w.id === id);
      }
    });
    updateTaskbar();
  }

  function toggleMinimize(id) {
    const win = windows.find(w => w.id === id);
    if (win) {
      win.minimized = !win.minimized;
      win.element.classList.toggle('minimized', win.minimized);
      if (win.minimized && activeWindowId === id) {
        const nextWin = windows.find(w => !w.minimized && w.id !== id);
        if (nextWin) focusWindow(nextWin.id);
        else activeWindowId = null;
      } else if (!win.minimized) focusWindow(id);
      updateTaskbar();
    }
  }

  function toggleMaximize(id) {
    const win = windows.find(w => w.id === id);
    if (win) {
      if (win.maximized) {
        win.element.classList.remove('maximized');
        win.element.style.width = `${win.w}px`;
        win.element.style.height = `${win.h}px`;
        win.element.style.left = `${win.x}px`;
        win.element.style.top = `${win.y}px`;
        win.maximized = false;
      } else {
        win.w = parseInt(win.element.style.width);
        win.h = parseInt(win.element.style.height);
        win.x = parseInt(win.element.style.left);
        win.y = parseInt(win.element.style.top);
        win.element.classList.add('maximized');
        win.maximized = true;
      }
      updateTaskbar();
    }
  }

  function closeWindow(id) {
    const win = windows.find(w => w.id === id);
    if (win) {
      win.element.remove();
      windows = windows.filter(w => w.id !== id);
      if (activeWindowId === id) {
        const nextWin = windows.find(w => !w.minimized);
        if (nextWin) focusWindow(nextWin.id);
        else activeWindowId = null;
      }
      updateTaskbar();
    }
  }

  function updateTaskbar() {
    const container = document.getElementById('taskbarApps');
    container.innerHTML = windows.map(win => `
      <div class="taskbar-app ${activeWindowId === win.id ? 'active' : ''}" data-id="${win.id}">
        <span>${win.app.icon}</span><span>${win.app.name}</span>
      </div>
    `).join('');
    container.querySelectorAll('.taskbar-app').forEach(el => {
      el.addEventListener('click', () => {
        const id = parseInt(el.dataset.id);
        const win = windows.find(w => w.id === id);
        if (win) {
          if (win.minimized) toggleMinimize(id);
          else focusWindow(id);
        }
      });
    });
  }

  // --- Desktop Icons ---
  function renderDesktopIcons() {
    const container = document.getElementById('desktopIcons');
    container.innerHTML = DESKTOP_ICONS.map(icon => {
      const app = APPS.find(a => a.id === icon.id);
      return `<div class="desktop-icon" data-app-id="${icon.id}"><div class="icon">${icon.icon}</div><div class="label">${icon.label}</div></div>`;
    }).join('');
    container.querySelectorAll('.desktop-icon').forEach(el => {
      el.addEventListener('dblclick', () => {
        const appId = el.dataset.appId;
        const app = APPS.find(a => a.id === appId);
        if (app) {
          const existing = windows.find(w => w.app.id === appId);
          if (existing) {
            if (existing.minimized) toggleMinimize(existing.id);
            focusWindow(existing.id);
          } else { createWindow(app); }
        }
      });
    });
  }

  // --- Start Menu ---
  function renderStartApps(search = '') {
    const container = document.getElementById('startApps');
    let filtered = APPS;
    if (search) filtered = APPS.filter(a => a.name.toLowerCase().includes(search.toLowerCase()));
    container.innerHTML = filtered.map(app => `
      <div class="start-app" data-app-id="${app.id}">
        <div class="start-app-icon">${app.icon}</div>
        <div class="start-app-name">${app.name}</div>
        <div class="start-app-desc">${app.desc}</div>
      </div>
    `).join('');
    container.querySelectorAll('.start-app').forEach(el => {
      el.addEventListener('click', () => {
        const appId = el.dataset.appId;
        const app = APPS.find(a => a.id === appId);
        if (app) {
          const existing = windows.find(w => w.app.id === appId);
          if (existing) {
            if (existing.minimized) toggleMinimize(existing.id);
            focusWindow(existing.id);
          } else { createWindow(app); }
          toggleStartMenu();
        }
      });
    });
  }

  function toggleStartMenu() {
    startMenuOpen = !startMenuOpen;
    document.getElementById('startMenu').classList.toggle('open', startMenuOpen);
    if (startMenuOpen) { document.getElementById('startSearch').focus(); renderStartApps(''); }
  }

  // --- Boot Menu ---
  function updateBootResults(query) {
    const container = document.getElementById('bootResults');
    let results = query ? gamesData.filter(g => g.name.toLowerCase().includes(query.toLowerCase())).slice(0, 10) : gamesData.slice(0, 8);
    currentBootResults = results;
    selectedBootIndex = results.length > 0 ? 0 : -1;
    if (results.length === 0) { container.innerHTML = '<div style="padding: 20px; text-align: center; color: rgba(255,255,255,0.4);">no games found</div>'; return; }
    container.innerHTML = results.map((game, idx) => `
      <div class="boot-result ${idx === selectedBootIndex ? 'selected' : ''}" data-index="${idx}">
        <div class="boot-result-icon">🎮</div>
        <div class="boot-result-info"><div class="boot-result-name">${escapeHtml(game.name)}</div><div class="boot-result-desc">${game.category || 'game'}</div></div>
      </div>
    `).join('');
    container.querySelectorAll('.boot-result').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.index);
        const game = currentBootResults[idx];
        if (game) {
          trackPlayedGame(game.name);
          window.open(`play.html?gameurl=${encodeURIComponent(game.url)}&game=${encodeURIComponent(game.name)}`, '_blank');
          toggleBootMenu();
        }
      });
    });
  }

  function toggleBootMenu() {
    bootMenuOpen = !bootMenuOpen;
    document.getElementById('bootMenu').classList.toggle('open', bootMenuOpen);
    if (bootMenuOpen) { document.getElementById('bootSearch').focus(); updateBootResults(''); }
  }

  function trackPlayedGame(name) {
    gamePlayCounts[name] = (gamePlayCounts[name] || 0) + 1;
    localStorage.setItem('gamePlayCounts', JSON.stringify(gamePlayCounts));
    const user = getCurrentUser();
    if (user && user.username !== 'Guest') {
      user.coins = (user.coins || 0) + 0.05;
      localStorage.setItem('fanter_currentUser', JSON.stringify(user));
    }
  }

  // --- Load Games ---
  async function loadGames() {
    try {
      const res = await fetch('./config/games.json');
      gamesData = await res.json();
      console.log(`✅ Loaded ${gamesData.length} games`);
    } catch(e) { console.error('Failed to load games:', e); gamesData = []; }
  }

  // --- Taskbar auto-hide ---
  let taskbarTimeout;
  const taskbarEl = document.getElementById('taskbar');
  function showTaskbar() { taskbarEl.classList.add('visible'); clearTimeout(taskbarTimeout); taskbarTimeout = setTimeout(() => taskbarEl.classList.remove('visible'), 2500); }
  document.addEventListener('mousemove', showTaskbar);
  showTaskbar();

  // --- UI Event Listeners ---
  document.getElementById('startBtn').addEventListener('click', toggleStartMenu);
  document.getElementById('startSearch').addEventListener('input', (e) => renderStartApps(e.target.value));
  document.getElementById('bootSearch').addEventListener('input', (e) => updateBootResults(e.target.value));
  document.getElementById('bootSearch').addEventListener('keydown', (e) => {
    if (e.key === 'ArrowDown') { e.preventDefault(); if (selectedBootIndex < currentBootResults.length - 1) { selectedBootIndex++; updateBootResults(document.getElementById('bootSearch').value); } }
    else if (e.key === 'ArrowUp') { e.preventDefault(); if (selectedBootIndex > 0) { selectedBootIndex--; updateBootResults(document.getElementById('bootSearch').value); } }
    else if (e.key === 'Enter') { e.preventDefault(); if (currentBootResults[selectedBootIndex]) { const game = currentBootResults[selectedBootIndex]; trackPlayedGame(game.name); window.open(`play.html?gameurl=${encodeURIComponent(game.url)}&game=${encodeURIComponent(game.name)}`, '_blank'); toggleBootMenu(); } }
  });

  document.getElementById('notifBtn').addEventListener('click', () => {
    document.getElementById('notificationCenter').classList.toggle('open');
  });

  document.getElementById('workspaceBtn').addEventListener('click', () => {
    const workspaces = ['🌿 workspace 1', '✨ workspace 2', '🎮 workspace 3'];
    const current = document.getElementById('workspaceIndicator').textContent;
    const next = workspaces[(workspaces.indexOf(current) + 1) % workspaces.length];
    document.getElementById('workspaceIndicator').textContent = next;
    showNotification(`switched to ${next}`);
  });

  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); toggleBootMenu(); }
    if (e.key === 'Escape') { if (bootMenuOpen) toggleBootMenu(); if (startMenuOpen) toggleStartMenu(); }
  });

  document.addEventListener('click', (e) => {
    if (startMenuOpen && !e.target.closest('.start-menu') && !e.target.closest('.start-btn')) toggleStartMenu();
    if (bootMenuOpen && !e.target.closest('.boot-menu')) toggleBootMenu();
    if (!e.target.closest('.notification-center') && !e.target.closest('#notifBtn')) {
      document.getElementById('notificationCenter').classList.remove('open');
    }
  });

  function closeNotifications() { document.getElementById('notificationCenter').classList.remove('open'); }

  // --- Safety Key ---
  let lastKey = '', lastKeyTime = 0;
  document.addEventListener('keydown', (e) => {
    const safetyKey = localStorage.getItem('safetyKey');
    const safetyUrl = localStorage.getItem('safetyUrl');
    if (safetyKey && safetyUrl && e.key.toLowerCase() === safetyKey.toLowerCase() && e.key === lastKey && Date.now() - lastKeyTime < 1000) window.location.href = safetyUrl;
    lastKey = e.key; lastKeyTime = Date.now();
  });

  // --- Init ---
  async function init() {
    await loadGames();
    renderDesktopIcons();
    updateUserDisplay();
    updateClock();
    setInterval(updateClock, 1000);
    setInterval(updateUserDisplay, 3000);
    setTimeout(() => {
      const gameHub = APPS.find(a => a.id === 'gamehub');
      if (gameHub) createWindow(gameHub, 60, 50, 1100, 750);
      showNotification('🎉 welcome to fanterOS! double-click icons or use start menu');
    }, 300);
  }

  init();
</script>
